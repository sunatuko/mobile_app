<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale = 1.0" />
    <title>HTML audio要素</title>
    <link rel="icon" href="./record.png" />
    <link rel="stylesheet" href="./css/sound_player.css" />
  </head>
  <body>
    <div class="wrapper">
      <div class="back">
        <button id="btn99" class="btn" type="button" onclick="history.back()">
          back
        </button>
      </div>

      <header>HTML audio要素</header>
      <p>ページ上の音楽プレイヤー、動画の音声の時に使う。</p>
      <div class="player-container" id="player">
        <div class="record">
          <div class="label"></div>
        </div>
        <div class="arm"></div>
      </div>

      <!--sound HTML <audio>要素：controls属性で再生ボタンを表示 -->
      <!-- ↓　↓　↓　↓　↓　↓　↓　↓　↓　↓　↓　↓　↓　↓　↓　↓　↓　↓　 -->

      <audio id="audio" controls loop>
        <source src="./sound/asian_neon.mp3" type="audio/mpeg" />
        Your browser does not support the audio element.
      </audio>

      <!-- ↑　↑　↑　↑　↑　↑　↑　↑　↑　↑　↑　↑　↑　↑　↑　↑　↑　↑　 -->

      <footer>
        <p>Copyright 2026 Sundai_IT_business_college</p>
      </footer>
    </div>

    <script src="./js/sound_player.js"></script>
  </body>
</html>
