<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale = 1.0" />
    <title>JS new Audio()コンストラクタ</title>
    <link rel="icon" href="./game.png" />
    <link rel="stylesheet" href="./css/sound_game.css" />
  </head>
  <body>
    <div class="wrapper">
      <div class="back">
        <button id="btn99" class="btn" type="button" onclick="history.back()">
          back
        </button>
      </div>

      <header>JS new Audio()<br />コンストラクタ</header>
      <p>
        効果音、クリック音、ゲームのBGM<br />裏でのバックグラウンド再生の時に使う。
      </p>
      <div class="btn-container">
        <div class="btn-area">
          <div class="quizBtn" id="btn1" type="button">１</div>
          <div class="quizBtn" id="btn2" type="button">２</div>
          <div class="quizBtn" id="btn3" type="button">３</div>
          <div class="quizBtn" id="btn4" type="button">４</div>
          <div class="quizBtn" id="btn5" type="button">５</div>
        </div>
      </div>

      <div class="reset">
        <div id="btnReset" class="btn" type="button">reset</div>
      </div>

      <footer>
        <p>Copyright 2026 Sundai_IT_business_college</p>
      </footer>
    </div>

    <!-- 紙吹雪を表示するライブラリ -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="./js/sound_game.js"></script>
  </body>
</html>
